name: SceneSlate Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build SceneSlate APK From ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check ZIP file
        run: |
          ls -la
          test -f SceneSlate_v0_1_Project.zip

      - name: Unzip SceneSlate project
        run: |
          mkdir build_src
          unzip -q SceneSlate_v0_1_Project.zip -d build_src
          ls -la build_src

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: |
          cd build_src
          gradle :app:assembleDebug --stacktrace

      - name: List APK outputs
        run: |
          find build_src/app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SceneSlate-v0.1-debug-apk
          path: build_src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
