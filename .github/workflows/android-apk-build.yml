name: SceneSlate Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build SceneSlate APK From Latest Version ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select highest version SceneSlate ZIP
        run: |
          echo "Repository ZIP files:"
          find . -maxdepth 1 -type f -iname "SceneSlate*.zip" -print

          python3 <<'PY'
          import os, re, glob

          files = glob.glob("SceneSlate*.zip")
          if not files:
              raise SystemExit("No SceneSlate ZIP file found.")

          def version_key(path):
              name = os.path.basename(path)
              # Examples:
              # SceneSlate_v0_2_9_Project.zip
              # SceneSlate_v0_2_10_Project.zip
              # SceneSlate_v0_2_11_Project.zip
              m = re.search(r'v(\d+)_(\d+)_(\d+)', name)
              if not m:
                  return (-1, -1, -1, name)
              return (int(m.group(1)), int(m.group(2)), int(m.group(3)), name)

          selected = sorted(files, key=version_key)[-1]
          print(f"Selected ZIP: ./{selected}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"ZIP_FILE=./{selected}\n")
              f.write(f"ZIP_BASENAME={os.path.splitext(os.path.basename(selected))[0]}\n")
          PY

      - name: Unzip SceneSlate project
        run: |
          rm -rf build_src
          mkdir build_src
          unzip -q "$ZIP_FILE" -d build_src

          echo "Unzipped files:"
          find build_src -maxdepth 3 -type f | head -100

          SETTINGS_FILE=$(find build_src -name "settings.gradle.kts" | head -n 1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "settings.gradle.kts not found in ZIP."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Project dir: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Show app version from Gradle
        run: |
          echo "Selected ZIP file: $ZIP_FILE"
          echo "Gradle version info:"
          grep -n "versionCode\|versionName" "$PROJECT_DIR/app/build.gradle.kts" || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: List APK outputs
        run: |
          find "$PROJECT_DIR/app/build/outputs/apk" -type f -name "*.apk" -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_BASENAME }}-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error