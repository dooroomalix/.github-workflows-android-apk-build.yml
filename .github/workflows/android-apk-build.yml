name: SceneSlate Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build SceneSlate APK From Latest ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select latest SceneSlate ZIP
        run: |
          echo "Repository files:"
          ls -la

          CHANGED_ZIP=$(git diff-tree --no-commit-id --name-only -r --root HEAD | grep -Ei 'SceneSlate.*\.zip$' | tail -n 1 || true)

          if [ -n "$CHANGED_ZIP" ] && [ -f "$CHANGED_ZIP" ]; then
            ZIP_FILE="$CHANGED_ZIP"
          else
            ZIP_FILE=$(find . -maxdepth 1 -type f -iname "SceneSlate*.zip" | sort -V | tail -n 1)
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "No SceneSlate ZIP file found."
            exit 1
          fi

          echo "Selected ZIP: $ZIP_FILE"
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

      - name: Unzip SceneSlate project
        run: |
          rm -rf build_src
          mkdir build_src
          unzip -q "$ZIP_FILE" -d build_src

          echo "Unzipped files:"
          find build_src -maxdepth 3 -type f | head -100

          SETTINGS_FILE=$(find build_src -name "settings.gradle.kts" | head -n 1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "settings.gradle.kts not found in ZIP."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Project dir: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: List APK outputs
        run: |
          find "$PROJECT_DIR/app/build/outputs/apk" -type f -name "*.apk" -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SceneSlate-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error